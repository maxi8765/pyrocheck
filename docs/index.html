<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#b71c1c">
<title>PyroCheck</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>🔥 PyroCheck</h1>
<p>Permit to Burn Application</p>
<form id="burnForm">
<label>Name<input name="name" required></label>
<label>Property Address<input name="address" required></label>
<label>Phone<input name="phone" type="tel" required></label>
<label>Email<input name="email" type="email" required></label>
<label>Purpose<textarea name="purpose"></textarea></label>
<label>Photos<input name="photos" type="file" multiple accept="image/*"></label>
<button type="submit">Submit</button>
</form>
<p id="status"></p>
<script src="script.js"></script>
</body>
</html>
